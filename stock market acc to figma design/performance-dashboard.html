<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Performance Dashboard</title>
  <link rel="stylesheet" href="performance-dashboard.css" />
</head>
<body>
  <div class="container">
    <div class="tabs">
      <button class="tab active">Performance</button>
      <button class="tab">Insights</button>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-header">
          <span>Revenue</span>
          <span class="change blue">+28%</span>
        </div>
        <div class="card-body">
          <div class="value">2.4M</div>
          <div class="progress blue"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span>Customers</span>
          <span class="change purple">+12%</span>
        </div>
        <div class="card-body">
          <div class="value">14.2K</div>
          <div class="progress purple"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span>Growth</span>
          <span class="change green">+18%</span>
        </div>
        <div class="card-body">
          <div class="value">32%</div>
          <div class="progress green"></div>
        </div>
      </div>
    </div>

    <div class="growth-trajectory">
      <h3>Growth Trajectory</h3>
      <div class="bar-chart">
        <div class="bar-group">
          <div class="bar" style="height: 80%;"></div>
          <span>Q1 2023</span>
        </div>
        <div class="bar-group">
          <div class="bar" style="height: 75%;"></div>
          <span>Q1 2023</span>
        </div>
        <div class="bar-group">
          <div class="bar" style="height: 65%;"></div>
          <span>Q2 2023</span>
        </div>
        <div class="bar-group">
          <div class="bar" style="height: 65%;"></div>
          <span>Q2 2023</span>
        </div>
        <div class="bar-group">
          <div class="bar" style="height: 40%;"></div>
          <span>Q2 2023</span>
        </div>
        <div class="bar-group">
          <div class="bar" style="height: 35%;"></div>
          <span>Q2 2023</span>
        </div>
        <div class="bar-group">
          <div class="bar" style="height: 60%;"></div>
          <span>Q3 2023</span>
        </div>
        <div class="bar-group">
          <div class="bar" style="height: 75%;"></div>
          <span>Q3 2023</span>
        </div>
        <div class="bar-group">
          <div class="bar" style="height: 65%;"></div>
          <span>Q3 2023</span>
        </div>
        <div class="bar-group">
          <div class="bar" style="height: 55%;"></div>
          <span>Q3 2023</span>
        </div>
        <div class="bar-group">
          <div class="bar" style="height: 85%;"></div>
          <span>Q4 2023</span>
        </div>
        <div class="bar-group">
          <div class="bar" style="height: 75%;"></div>
          <span>Q4 2023</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
