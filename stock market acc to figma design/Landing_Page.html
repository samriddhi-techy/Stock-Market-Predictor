<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trading Platform</title>
  <link rel="stylesheet" href="Landing_Page.css" />
</head>
<body>
  <main class="hero">
    <div class="hero-content">
      <div class="badge">
        <span class="dot"></span> Next-Gen Trading Platform
      </div>
      <h1 class="headline">
        Transform Your <span class="gradient-text">Trading</span> Journey
      </h1>
      <p class="description">
        Experience professional-grade tools, real-time analytics, and institutional-level insights in one powerful platform.
      </p>
      <div class="cta-buttons">
        <button class="btn primary">Start Trading Now</button>
        <button class="btn secondary">Watch Demo</button>
      </div>
      <div class="stats">
        <div class="stat">
          <h2>2.4M+</h2>
          <p>Active Traders</p>
        </div>
        <div class="stat">
          <h2>$850B+</h2>
          <p>Trading Volume</p>
        </div>
        <div class="stat">
          <h2>150+</h2>
          <p>Global Markets</p>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
