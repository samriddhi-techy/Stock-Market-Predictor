<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crypto Market Overview</title>
  <link rel="stylesheet" href="crypto-overview.css" />
</head>
<body>
  <div class="container">
    <p class="generated">Generated Design</p>

    <div class="overview-header">
      <h2>Crypto Market Overview</h2>
      <div class="tabs">
        <button class="tab active">Overview</button>
        <button class="tab">Prediction</button>
        <button class="tab">Fundamentals</button>
      </div>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-header">
          <div class="coin-info">
            <div class="coin-avatar btc"></div>
            <div>
              <div class="coin-name">BTC</div>
              <div class="coin-fullname">Bitcoin</div>
            </div>
          </div>
          <div class="coin-price">
            <div>$43250.00</div>
            <div class="change up">+8.4%</div>
          </div>
        </div>
        <div class="chart chart-btc"></div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="coin-info">
            <div class="coin-avatar eth"></div>
            <div>
              <div class="coin-name">ETH</div>
              <div class="coin-fullname">Ethereum</div>
            </div>
          </div>
          <div class="coin-price">
            <div>$2280.00</div>
            <div class="change up">+6.2%</div>
          </div>
        </div>
        <div class="chart chart-eth"></div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="coin-info">
            <div class="coin-avatar sol"></div>
            <div>
              <div class="coin-name">SOL</div>
              <div class="coin-fullname">Solana</div>
            </div>
          </div>
          <div class="coin-price">
            <div>$98.50</div>
            <div class="change down">-2.3%</div>
          </div>
        </div>
        <div class="chart chart-sol"></div>
      </div>
    </div>
  </div>
</body>
</html>
