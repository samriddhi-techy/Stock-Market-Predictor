<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
  <link rel="stylesheet" href="dashboard-styles.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <h1 class="title">Welcome <span class="gradient-text">Back</span></h1>
      <p class="subtitle">Your portfolio is looking great today</p>

      <div class="balance-section">
        <div>
          <p class="label">Total Balance</p>
          <p class="balance">$284,750.25</p>
        </div>
        <div class="percentage-change">
          +12.8% <span class="arrow">▲</span>
        </div>
      </div>

      <div class="change-section">
        <p class="label">24h Change</p>
        <p class="change">+$32,299.50</p>
      </div>

      <button class="details-btn">View Details</button>
    </div>
  </div>
</body>
</html>
