<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Overview</title>
  <link rel="stylesheet" href="portfolio-overview.css">
</head>
<body>
  <div class="container">
    <section class="portfolio-card">
      <div class="portfolio-header">
        <h1>Portfolio Overview</h1>
        <span class="portfolio-growth">+15.2%</span>
      </div>
      <div class="portfolio-main">
        <div class="portfolio-value">
          <div class="value">$1.8M</div>
          <div class="label">Total Portfolio Value</div>
          <ul class="sectors">
            <li><span class="dot tech"></span> Technology <span class="percent">35%</span></li>
            <li><span class="dot health"></span> Healthcare <span class="percent">25%</span></li>
            <li><span class="dot finance"></span> Finance <span class="percent">20%</span></li>
            <li><span class="dot consumer"></span> Consumer <span class="percent">12%</span></li>
            <li><span class="dot energy"></span> Energy <span class="percent">8%</span></li>
          </ul>
        </div>
        <div class="performance-card">
          <div class="performance-header">
            <span>Performance Metrics</span>
            <span class="performance-ytd">+32.8% YTD</span>
          </div>
          <div class="performance-metrics">
            <div>
              <div class="metric-label">Total Gain</div>
              <div class="metric-value gain">+$312,847</div>
              <div class="metric-sub">+38.4%</div>
            </div>
            <div>
              <div class="metric-label">Today's Change</div>
              <div class="metric-value gain">+$18,392</div>
              <div class="metric-sub">+2.3%</div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
