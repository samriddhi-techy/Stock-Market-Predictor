<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Market Predictor</title>
  <link rel="stylesheet" href="Ai_stock_predictor_tool.css" />
</head>
<body>
  <div class="predictor-container">
    <h1 class="title">Market Predictor</h1>

    <div class="input-section">
      <input type="text" class="asset-input" placeholder="Search assets..." />
      
      <div class="labels">
        <div class="label-group">
          <span class="label-title">Time Frame (Days)</span>
          <span class="label-value">30 days</span>
        </div>
        <div class="label-group">
          <span class="label-title">Risk Level</span>
          <span class="label-value">50%</span>
        </div>
      </div>
    </div>

    <button class="generate-btn">Generate Prediction</button>
  </div>
</body>
</html>
