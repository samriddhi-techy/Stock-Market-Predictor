<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Market Overview</title>
  <link rel="stylesheet" href="market-styles.css" />
</head>
<body>
  <div class="container">
    <h1 class="title">Market <span class="gradient-text">Overview</span></h1>
    <p class="subtitle">Track and analyze your favorite stocks</p>

    <div class="search-box">
      <input type="text" placeholder="Search stocks..."/>
    </div>

    <div class="stock-list">
      <div class="stock-card">
        <div class="left">
          <div class="avatar">A</div>
          <div>
            <p class="stock-symbol">AAPL</p>
            <p class="company-name">Apple Inc</p>
            <p class="sector">• Technology</p>
          </div>
        </div>
        <div class="right">
          <p class="price">$182.89</p>
          <p class="change up">+3.5%</p>
          <p class="volume">• Vol: 45.2M</p>
        </div>
      </div>

      <div class="stock-card">
        <div class="left">
          <div class="avatar">M</div>
          <div>
            <p class="stock-symbol">MSFT</p>
            <p class="company-name">Microsoft</p>
            <p class="sector">• Technology</p>
          </div>
        </div>
        <div class="right">
          <p class="price">$338.11</p>
          <p class="change up">+1.2%</p>
          <p class="volume">• Vol: 22.1M</p>
        </div>
      </div>

      <div class="stock-card">
        <div class="left">
          <div class="avatar">J</div>
          <div>
            <p class="stock-symbol">JPM</p>
            <p class="company-name">JPMorgan</p>
            <p class="sector">• Finance</p>
          </div>
        </div>
        <div class="right">
          <p class="price">$146.45</p>
          <p class="change down">-0.8%</p>
          <p class="volume">• Vol: 8.4M</p>
        </div>
      </div>

      <div class="stock-card">
        <div class="left">
          <div class="avatar">C</div>
          <div>
            <p class="stock-symbol">CVX</p>
            <p class="company-name">Chevron</p>
            <p class="sector">• Energy</p>
          </div>
        </div>
        <div class="right">
          <p class="price">$152.24</p>
          <p class="change up">+2.1%</p>
          <p class="volume">• Vol: 5.9M</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
